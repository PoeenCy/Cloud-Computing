name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

# ─── Biến cần set trong GitHub Secrets ────────────────────────────────────────
# EC2_HOST        : Public IP hoặc domain của EC2 (ví dụ: 54.123.45.67)
# EC2_USER        : User SSH (thường là ec2-user hoặc ubuntu)
# EC2_SSH_KEY     : Nội dung file .pem (private key) — paste toàn bộ nội dung
# EC2_DEPLOY_PATH : Đường dẫn project trên EC2 (ví dụ: /home/ec2-user/MiniCloud)
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  deploy:
    name: Deploy to EC2 via SSH
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Di chuyển vào thư mục project
            cd ${{ secrets.EC2_DEPLOY_PATH }}

            # Pull code mới nhất
            git pull origin main

            # Build lại các image có thay đổi và restart services
            docker compose -f MiniCloud/docker-compose.yml pull --ignore-pull-failures || true
            docker compose -f MiniCloud/docker-compose.yml up -d --build

            # Dọn dẹp image cũ không dùng nữa
            docker image prune -f

            # Kiểm tra các container đang chạy
            docker compose -f MiniCloud/docker-compose.yml ps
