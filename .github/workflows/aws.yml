name: CI/CD Pipeline - Flask App to AWS EC2

# ============================================
# Trigger: Chạy khi push vào nhánh main
# ============================================
on:
  push:
    branches:
      - main
  workflow_dispatch: # Cho phép trigger thủ công từ GitHub UI

# ============================================
# Environment Variables
# ============================================
env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: flask-app
  CONTAINER_NAME: flask_app
  APP_PORT: 8081

# ============================================
# Jobs
# ============================================
jobs:
  # ==========================================
  # JOB 1: CI - Build & Push Docker Image
  # ==========================================
  build_and_push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    
    steps:
      # Step 1: Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Set up Python environment
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          cd MiniCloud/app
          pip install --no-cache-dir -r requirements.txt
          pip install pytest pytest-cov
      
      # Step 4: Run Unit Tests
      - name: Run Unit Tests
        run: |
          cd MiniCloud/app
          # Chạy pytest với coverage report
          pytest --cov=src --cov-report=term-missing --cov-report=xml
          echo "✅ All tests passed!"
      
      # Step 5: Configure AWS Credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      # Step 6: Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      # Step 7: Extract metadata for Docker
      - name: Extract Docker metadata
        id: meta
        run: |
          IMAGE_TAG="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          IMAGE_LATEST="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"
          echo "tags=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "latest=${IMAGE_LATEST}" >> $GITHUB_OUTPUT
          echo "📦 Image will be tagged as: ${IMAGE_TAG}"
      
      # Step 8: Build Docker image
      - name: Build Docker image
        id: build
        run: |
          cd MiniCloud/app
          docker build \
            --tag ${{ steps.meta.outputs.tags }} \
            --tag ${{ steps.meta.outputs.latest }} \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            --label "build.date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            .
          echo "✅ Docker image built successfully"
      
      # Step 9: Push Docker image to ECR
      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.meta.outputs.tags }}
          docker push ${{ steps.meta.outputs.latest }}
          echo "✅ Docker image pushed to ECR"
          echo "📦 Image: ${{ steps.meta.outputs.tags }}"
      
      # Step 10: Image vulnerability scan (optional but recommended)
      - name: Scan Docker image for vulnerabilities
        continue-on-error: true
        run: |
          # Install Trivy scanner
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y
          
          # Scan image
          trivy image --severity HIGH,CRITICAL ${{ steps.meta.outputs.tags }}

  # ==========================================
  # JOB 2: CD - Deploy to App Server 1
  # ==========================================
  deploy_app_1:
    name: Deploy to App Server 1
    runs-on: ubuntu-latest
    needs: build_and_push
    
    steps:
      # Step 1: Deploy via SSH to App Server 1
      - name: Deploy to App Server 1 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.APP1_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: ECR_REGISTRY,IMAGE_TAG,ECR_REPOSITORY,CONTAINER_NAME,APP_PORT,AWS_REGION
          script_stop: true # Stop on first error
          script: |
            set -e  # Exit on any error
            
            echo "🚀 Starting deployment on App Server 1..."
            echo "📦 Image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
            
            # Step 1: AWS ECR Login
            echo "🔐 Logging into AWS ECR..."
            aws ecr get-login-password --region ${AWS_REGION} | \
              docker login --username AWS --password-stdin ${ECR_REGISTRY}
            
            # Step 2: Pull latest image
            echo "📥 Pulling Docker image..."
            docker pull ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
            
            # Step 3: Stop and remove old container (if exists)
            echo "🛑 Stopping old container..."
            docker stop ${CONTAINER_NAME} 2>/dev/null || true
            docker rm -f ${CONTAINER_NAME} 2>/dev/null || true
            
            # Step 4: Run new container
            echo "🐳 Starting new container..."
            docker run -d \
              --name ${CONTAINER_NAME} \
              --restart unless-stopped \
              -p ${APP_PORT}:${APP_PORT} \
              -e INSTANCE_ID=1 \
              -e DB_USER=admin \
              -e REDIS_HOST=minicloud-redis \
              -e REDIS_PORT=6379 \
              --network minicloud_frontend-net \
              --network minicloud_backend-net \
              --network minicloud_mgmt-net \
              ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
            
            # Step 5: Wait for container to be ready
            echo "⏳ Waiting for container to start..."
            sleep 5
            
            # Step 6: Health check with retry
            echo "🏥 Running health check..."
            MAX_RETRIES=5
            RETRY_INTERVAL=5
            
            for i in $(seq 1 $MAX_RETRIES); do
              echo "Attempt $i/$MAX_RETRIES..."
              
              if curl -f -s http://localhost:${APP_PORT}/api/hello > /dev/null; then
                echo "✅ Health check passed!"
                echo "🎉 Deployment to App Server 1 completed successfully!"
                exit 0
              fi
              
              if [ $i -lt $MAX_RETRIES ]; then
                echo "⚠️  Health check failed, retrying in ${RETRY_INTERVAL}s..."
                sleep $RETRY_INTERVAL
              fi
            done
            
            # If we get here, all retries failed
            echo "❌ Health check failed after $MAX_RETRIES attempts"
            echo "📋 Container logs:"
            docker logs ${CONTAINER_NAME} --tail 50
            exit 1
      
      # Step 2: Notify deployment status
      - name: Deployment status for App Server 1
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ App Server 1 deployment: SUCCESS"
          else
            echo "❌ App Server 1 deployment: FAILED"
            exit 1
          fi

  # ==========================================
  # JOB 3: CD - Deploy to App Server 2
  # CRITICAL: Only runs after App1 succeeds
  # This ensures Zero-Downtime Deployment
  # ==========================================
  deploy_app_2:
    name: Deploy to App Server 2 (Rolling Update)
    runs-on: ubuntu-latest
    needs: deploy_app_1  # ⚠️ CRITICAL: Wait for App1 to succeed
    
    steps:
      # Step 1: Deploy via SSH to App Server 2
      - name: Deploy to App Server 2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.APP2_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: ECR_REGISTRY,IMAGE_TAG,ECR_REPOSITORY,CONTAINER_NAME,APP_PORT,AWS_REGION
          script_stop: true # Stop on first error
          script: |
            set -e  # Exit on any error
            
            echo "🚀 Starting deployment on App Server 2..."
            echo "📦 Image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
            
            # Step 1: AWS ECR Login
            echo "🔐 Logging into AWS ECR..."
            aws ecr get-login-password --region ${AWS_REGION} | \
              docker login --username AWS --password-stdin ${ECR_REGISTRY}
            
            # Step 2: Pull latest image
            echo "📥 Pulling Docker image..."
            docker pull ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
            
            # Step 3: Stop and remove old container (if exists)
            echo "🛑 Stopping old container..."
            docker stop ${CONTAINER_NAME} 2>/dev/null || true
            docker rm -f ${CONTAINER_NAME} 2>/dev/null || true
            
            # Step 4: Run new container
            echo "🐳 Starting new container..."
            docker run -d \
              --name ${CONTAINER_NAME} \
              --restart unless-stopped \
              -p ${APP_PORT}:${APP_PORT} \
              -e INSTANCE_ID=2 \
              -e DB_USER=admin \
              -e REDIS_HOST=minicloud-redis \
              -e REDIS_PORT=6379 \
              --network minicloud_frontend-net \
              --network minicloud_backend-net \
              --network minicloud_mgmt-net \
              ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
            
            # Step 5: Wait for container to be ready
            echo "⏳ Waiting for container to start..."
            sleep 5
            
            # Step 6: Health check with retry
            echo "🏥 Running health check..."
            MAX_RETRIES=5
            RETRY_INTERVAL=5
            
            for i in $(seq 1 $MAX_RETRIES); do
              echo "Attempt $i/$MAX_RETRIES..."
              
              if curl -f -s http://localhost:${APP_PORT}/api/hello > /dev/null; then
                echo "✅ Health check passed!"
                echo "🎉 Deployment to App Server 2 completed successfully!"
                exit 0
              fi
              
              if [ $i -lt $MAX_RETRIES ]; then
                echo "⚠️  Health check failed, retrying in ${RETRY_INTERVAL}s..."
                sleep $RETRY_INTERVAL
              fi
            done
            
            # If we get here, all retries failed
            echo "❌ Health check failed after $MAX_RETRIES attempts"
            echo "📋 Container logs:"
            docker logs ${CONTAINER_NAME} --tail 50
            exit 1
      
      # Step 2: Notify deployment status
      - name: Deployment status for App Server 2
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ App Server 2 deployment: SUCCESS"
          else
            echo "❌ App Server 2 deployment: FAILED"
            exit 1
          fi

  # ==========================================
  # JOB 4: Post-Deployment Verification
  # ==========================================
  verify_deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy_app_1, deploy_app_2]
    
    steps:
      - name: Verify both servers are healthy
        run: |
          echo "🎉 ============================================"
          echo "🎉 DEPLOYMENT COMPLETED SUCCESSFULLY!"
          echo "🎉 ============================================"
          echo ""
          echo "✅ App Server 1: Deployed and healthy"
          echo "✅ App Server 2: Deployed and healthy"
          echo ""
          echo "📦 Image: ${{ needs.build_and_push.outputs.image_tag }}"
          echo "🔖 Git SHA: ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo ""
          echo "🔗 Nginx Proxy should now be load balancing between both servers"
          echo "🚀 Zero-downtime deployment achieved!"
      
      # Optional: Send notification to Slack/Discord/Email
      - name: Send deployment notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" == "success" ]; then
            echo "📢 Sending SUCCESS notification..."
            # Add your notification logic here (Slack webhook, etc.)
          else
            echo "📢 Sending FAILURE notification..."
            # Add your notification logic here
          fi
