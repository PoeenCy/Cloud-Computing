<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chưa đăng nhập — MiniCloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full">
        <!-- Card -->
        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-10 text-center">

            <!-- Icon -->
            <div
                class="w-20 h-20 bg-orange-50 border-2 border-orange-200 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>

            <!-- Badge -->
            <span
                class="inline-block bg-red-50 text-red-500 border border-red-200 text-xs font-bold px-3 py-1 rounded-full mb-4">
                401 — Chưa xác thực
            </span>

            <h1 class="text-2xl font-extrabold text-gray-900 mb-2">Truy cập bị từ chối</h1>
            <p class="text-gray-500 text-sm mb-6 leading-relaxed">
                Trang này yêu cầu đăng nhập qua <span class="text-orange-500 font-semibold">Keycloak</span>.<br>
                Vui lòng về trang chủ và đăng nhập để tiếp tục.
            </p>

            <!-- URL box -->
            <div class="bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 mb-6 text-left">
                <p class="text-gray-400 text-xs mb-1 font-medium">Trang bạn muốn truy cập:</p>
                <p id="target-url" class="text-blue-500 font-mono text-xs break-all"></p>
            </div>

            <!-- Actions -->
            <div class="flex flex-col gap-3">
                <a href="/"
                    class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-6 rounded-xl transition shadow-md shadow-orange-200 flex items-center justify-center gap-2">
                    🏠 Về trang chủ &amp; Đăng nhập
                </a>
                <button onclick="history.back()"
                    class="bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold py-3 px-6 rounded-xl transition flex items-center justify-center gap-2">
                    ← Quay lại trang trước
                </button>
            </div>
        </div>

        <p class="text-center text-gray-400 text-xs mt-6">MiniCloud · Xác thực tập trung qua Keycloak + Redis</p>
    </div>

    <script>
        document.getElementById('target-url').textContent = window.location.href;
        // Nếu đã có token hợp lệ → tự reload
        const token = localStorage.getItem('mc_access_token') ||
            (document.cookie.match(/mc_token=([^;]*)/) || [])[1];
        if (token) {
            fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => { if (r.ok) window.location.href = new URLSearchParams(location.search).get('from') || '/'; })
                .catch(() => { });
        }
    </script>
</body>

</html>
