user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Trỏ đến DNS nội bộ (minicloud-dns) để phân giải .cloud.local
    resolver 10.10.3.53 valid=30s;

    server {
        listen 80;
        server_name _;

        # 1. Giao diện Frontend (Dashboard/Blog)
        location / {
            set $web_upstream "http://web.cloud.local:80";
            proxy_pass $web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Backend API (Flask App)
        location /api/ {
            set $app_upstream "http://app.cloud.local:8081";
            proxy_pass $app_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Điều hướng Keycloak (Fix lỗi 404 khi thiếu dấu /)
        location = /auth {
            return 301 /auth/;
        }

        # 4. Keycloak Identity Server
        location /auth/ {
            proxy_pass http://auth:8080/auth/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 8088;
            proxy_set_header X-Forwarded-Prefix /auth;

            # Buffer lớn hơn cho Keycloak (token, redirect headers)
            proxy_buffer_size          16k;
            proxy_buffers              8 16k;
            proxy_busy_buffers_size    32k;
        }
    }
}