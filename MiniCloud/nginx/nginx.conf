user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # DNS nội bộ Bind9
    resolver 10.10.3.53 valid=30s;

    # -------------------------------------------------------
    # Mục 10: Round Robin Load Balancing — 2 Web Instances
    # Dùng IP tĩnh để tránh DNS resolve lúc startup
    # -------------------------------------------------------
    upstream web_pool {
        server 10.10.1.11:80;   # web1
        server 10.10.1.20:80;   # web2
    }

    server {
        listen 80;
        server_name _;

        # 1. Frontend — Round Robin qua web_pool
        location / {
            proxy_pass http://web_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Redirect /blog/ về trang chủ
        location = /blog/ {
            return 301 /;
        }

        # 2. Backend API
        location /api/ {
            set $app_upstream "http://app.cloud.local:8081";
            proxy_pass $app_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Mục 9: Route /student/ thẳng vào /api/student trên backend
        location /student/ {
            set $app_upstream "http://app.cloud.local:8081";
            rewrite ^/student/(.*)$ /api/student break;
            proxy_pass $app_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 4. Redirect /auth → /auth/
        location = /auth {
            return 301 /auth/;
        }

        # 5. Keycloak Identity Server
        location /auth/ {
            proxy_pass http://auth:8080/auth/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 8088;
            proxy_set_header X-Forwarded-Prefix /auth;
            proxy_buffer_size          16k;
            proxy_buffers              8 16k;
            proxy_busy_buffers_size    32k;
        }
    }
}
