user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Important: point to internal bind9 DNS server to resolve .cloud.local
    resolver 10.10.3.53 valid=30s;

    server {
        listen 80;
        server_name _;

        location / {
            set $web_upstream "http://web.cloud.local:80";
            proxy_pass $web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            set $app_upstream "http://app.cloud.local:8081";
            proxy_pass $app_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Keycloak: KC_HTTP_RELATIVE_PATH=/auth — giữ nguyên URI /auth/... khi proxy (không strip)
        location = /auth {
            return 301 /auth/;
        }
        location /auth/ {
            set $auth_upstream "http://auth.cloud.local:8080";
            proxy_pass $auth_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /student/ {
            set $student_upstream "http://app.cloud.local:8081";
            proxy_pass $student_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
