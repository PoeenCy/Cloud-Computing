user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    resolver 10.10.3.53 valid=30s;

    upstream web_pool {
        server 10.10.1.11:80;
        server 10.10.1.20:80;
    }

    upstream app_pool {
        server 10.10.1.12:8081;
        server 10.10.1.22:8081;
    }

    server {
        listen 80;
        server_name _;

        # ── Auth subrequest — đọc token từ cookie mc_token ───────────────
        # Flask endpoint /api/auth/me-cookie đọc cookie thay vì header
        location = /_auth_check {
            internal;
            proxy_pass              http://app_pool/api/auth/me-cookie;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        X-Original-URI $request_uri;
            # Chuyển cookie để Flask đọc mc_token
            proxy_set_header        Cookie $http_cookie;
            # Cũng chuyển Authorization nếu có (cho API client)
            proxy_set_header        Authorization $http_authorization;
        }

        # ── Trang lỗi ────────────────────────────────────────────────────
        # 401: chưa xác thực
        error_page 401 = @handle_401;
        location @handle_401 {
            # Browser → hiện trang 401.html đẹp
            if ($http_accept ~* "text/html") {
                return 302 /401.html?from=$request_uri;
            }
            # API client → trả JSON
            default_type application/json;
            return 401 '{"error":"Unauthorized","detail":"Chua dang nhap"}';
        }

        # 403: không đủ quyền → cũng dùng trang 401.html
        error_page 403 = @handle_403;
        location @handle_403 {
            if ($http_accept ~* "text/html") {
                return 302 /401.html?from=$request_uri;
            }
            default_type application/json;
            return 403 '{"error":"Forbidden","detail":"Khong du quyen"}';
        }

        # 404: không tìm thấy trang
        error_page 404 = @handle_404;
        location @handle_404 {
            if ($http_accept ~* "text/html") {
                return 302 /404.html;
            }
            default_type application/json;
            return 404 '{"error":"Not Found","detail":"Khong tim thay trang"}';
        }

        # Serve trang lỗi tĩnh từ web pool (không qua auth)
        location = /401.html {
            proxy_pass http://web_pool;
            proxy_set_header Host $host;
        }
        location = /404.html {
            proxy_pass http://web_pool;
            proxy_set_header Host $host;
        }

        # ── 1. Frontend — public ──────────────────────────────────────────
        location / {
            proxy_pass http://web_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /blog/ { return 301 /; }

        # ── 2. API Flask ──────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://app_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /student/ {
            rewrite ^/student/(.*)$ /api/student break;
            proxy_pass http://app_pool;
            proxy_set_header Host $host;
        }

        # ── 3. Keycloak — public ──────────────────────────────────────────
        location = /auth { return 301 /auth/; }

        location /auth/ {
            proxy_pass http://auth:8080/auth/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 8088;
            proxy_set_header X-Forwarded-Prefix /auth;
            proxy_buffer_size       16k;
            proxy_buffers           8 16k;
            proxy_busy_buffers_size 32k;
        }

        # ── 4. Grafana — tự quản lý auth ─────────────────────────────────
        location /grafana/ {
            proxy_pass http://10.10.3.18:3000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /grafana;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── 5. Prometheus — bảo vệ bằng cookie ───────────────────────────
        location /prometheus/ {
            auth_request /_auth_check;
            proxy_pass http://10.10.3.16:9090;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── 6. MinIO Console — MinIO tự quản lý auth ─────────────────────
        # Không dùng auth_request vì MinIO có login page riêng
        # Nginx chỉ làm nhiệm vụ reverse proxy, MinIO tự xác thực user
        location /minio/ {
            # Tắt error_page intercept — để MinIO tự xử lý 401/403
            proxy_intercept_errors off;

            proxy_pass http://10.10.2.15:9001/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-NginX-Proxy true;

            # Cần thiết cho MinIO Console WebSocket (live updates)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Rewrite redirect từ MinIO: /login → /minio/login
            proxy_redirect ~^/(.*)$ /minio/$1;

            # Tăng timeout cho MinIO uploads
            proxy_read_timeout 900s;
            proxy_connect_timeout 900s;
            proxy_send_timeout 900s;
        }
    }
}
