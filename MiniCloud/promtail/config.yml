server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://minicloud-loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape logs từ Docker containers
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Chỉ scrape containers có label logging=promtail
      - source_labels: ['__meta_docker_container_label_logging']
        regex: 'promtail'
        action: keep
      
      # Lấy tên container
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      
      # Lấy container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      
      # Lấy image name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      
      # Lấy project name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'

  # Scrape logs từ Nginx Proxy
  - job_name: nginx-proxy
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-proxy
          __path__: /var/lib/docker/containers/*minicloud-proxy*/*.log

  # Scrape logs từ Web servers
  - job_name: web
    static_configs:
      - targets:
          - localhost
        labels:
          job: web
          __path__: /var/lib/docker/containers/*minicloud-web*/*.log

  # Scrape logs từ App Flask
  - job_name: app
    static_configs:
      - targets:
          - localhost
        labels:
          job: app
          __path__: /var/lib/docker/containers/*minicloud-app*/*.log

  # Scrape logs từ MariaDB
  - job_name: db
    static_configs:
      - targets:
          - localhost
        labels:
          job: db
          __path__: /var/lib/docker/containers/*minicloud-db*/*.log

  # Scrape logs từ Keycloak
  - job_name: auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          __path__: /var/lib/docker/containers/*minicloud-auth*/*.log
