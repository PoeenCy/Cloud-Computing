global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus tự scrape chính nó
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter — CPU, RAM, Disk, Network
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['minicloud-node-exporter:9100']

  # Nginx Web Server (qua stub_status module)
  - job_name: 'web'
    static_configs:
      - targets: ['web1.cloud.local:80', 'web2.cloud.local:80']
    metrics_path: /stub_status

  # Flask Application Server
  - job_name: 'app'
    static_configs:
      - targets: ['app.cloud.local:8081']
    metrics_path: /api/hello

  # MariaDB (qua healthcheck endpoint)
  - job_name: 'db'
    static_configs:
      - targets: ['minicloud-db:3306']
